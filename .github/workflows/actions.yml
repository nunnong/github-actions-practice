# .github/workflows/actions.yml

name: Github Actions

# push: github에 push할 때마다 실행
on: push

jobs:
  push-job:
    # 아래 문장은 필수적으로 넣어주기.
    # specify that a job should run on the latest available Ubuntu virtual machine hosted by GitHub

    runs-on: ubuntu-latest
    steps:
      # 1. github action에 Repo 코드 가져오기
      - name: Repository 코드 가져오기
        uses: actions/checkout@v5 

      # 2. Node.js 설치
      - name: Node.js 설치
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # 3. 의존성 설치
      - name: 패키지 설치
          # npm install -> package-lock.json 을 새로 만들어주는 역할
          # npm ci -> package-lock.json을 바탕으로 설치한다.
        run: npm install

      # 4. 린트 검사
      - name: ESLint 실행
        run: npm run lint

      # 5. 테스트 실행
      - name: Jest 테스트
        run: npm run test

      # 6. 빌드
      - name: 빌드
        run: npm run build